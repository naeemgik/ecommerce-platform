# Production profile - use with: --spring.profiles.active=prod
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:productdb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      pool-name: ProductServicePool-Prod
      maximum-pool-size: 30
      minimum-idle: 10

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate  # Never use create-drop in production
    show-sql: false

logging:
  level:
    com.ecommerce.product: INFO
    org.springframework.cache: WARN
